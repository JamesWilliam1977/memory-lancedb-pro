# Memory Lancedb Pro Workflow Bugfix With Tdd And Ci Manifest Update

## Action

Follow the bugfix-with-tdd-and-ci-manifest-update workflow:
1. Write failing test(s) for the bug (TDD) in test/*.test.mjs
2. Implement the bugfix in relevant source files (e.g., index.ts, src/*.ts)
3. Update or add type/interface definitions if needed (e.g., src/*.ts)
4. Update scripts/ci-test-manifest.mjs to include new/updated tests
5. Verify all tests pass and CI covers the new cases

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: index.ts, src/*.ts, test/*.test.mjs

